name: jellyfin

services:
  jellyfin:
    image: jellyfin/jellyfin:${JELLYFIN_TAG}
    container_name: jellyfin
    restart: unless-stopped
    environment:
    - TZ=${TZ}
    ports:
    - "${JELLYFIN_PORT}:8096"
    volumes:
    - ${JELLYFIN_CONFIG_PATH}:/config
    - ${JELLYFIN_CACHE_PATH}:/cache
    - ${JELLYFIN_MEDIA_PATH}:/media:ro
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8096/health
      interval: 30s
      timeout: 10s
      retries: 3
