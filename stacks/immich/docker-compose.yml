name: immich

services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION}
    container_name: immich-server
    restart: unless-stopped
    depends_on:
    - immich-redis
    - immich-database
    environment:
      DB_HOSTNAME: immich-database
      DB_USERNAME: ${IMMICH_DB_USERNAME}
      DB_PASSWORD: ${IMMICH_DB_PASSWORD}
      DB_DATABASE_NAME: ${IMMICH_DB_DATABASE_NAME}
      REDIS_HOSTNAME: immich-redis
      TZ: ${TZ}
      # Trust the Sovereign internal CA so immich-server can reach
      # https://auth.internal for OIDC (discovery + token exchange). The photo
      # data volume below is untouched; this only adds outbound TLS trust.
      NODE_EXTRA_CA_CERTS: /run/secrets/sovereign-root-ca.crt
    # VM 110's systemd-resolved prefers the router's IPv6 DNS over AdGuard and
    # can't resolve *.internal, so map auth.internal to NPM (192.168.1.50)
    # directly for the OIDC server-to-server calls -- same target browsers use.
    extra_hosts:
    - "auth.internal:192.168.1.50"
    ports:
    - "${IMMICH_PORT}:2283"
    volumes:
    - ${IMMICH_UPLOAD_LOCATION}:/data
    - /etc/localtime:/etc/localtime:ro
    - ./sovereign-root-ca.crt:/run/secrets/sovereign-root-ca.crt:ro

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION}
    container_name: immich-machine-learning
    restart: unless-stopped
    volumes:
    - immich_model_cache:/cache

  immich-redis:
    image: docker.io/valkey/valkey:9@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
    container_name: immich-redis
    restart: unless-stopped

    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 10s
      timeout: 5s
      retries: 5
  immich-database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    container_name: immich-database
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD}
      POSTGRES_USER: ${IMMICH_DB_USERNAME}
      POSTGRES_DB: ${IMMICH_DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
    - ${IMMICH_DB_DATA_LOCATION}:/var/lib/postgresql/data

volumes:
  immich_model_cache:
