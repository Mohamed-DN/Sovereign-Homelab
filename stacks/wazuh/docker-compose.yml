name: wazuh

services:
  wazuh-manager:
    image: wazuh/wazuh-manager:${WAZUH_TAG}
    container_name: wazuh-manager
    restart: unless-stopped
    ports:
    - "${WAZUH_API_PORT}:55000"
    volumes:
    - wazuh_data:/var/ossec/data

    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:55000/healthCheck
      interval: 60s
      timeout: 10s
      retries: 3
volumes:
  wazuh_data:
