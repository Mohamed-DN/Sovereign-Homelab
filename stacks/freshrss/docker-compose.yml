name: freshrss

services:
  freshrss:
    image: freshrss/freshrss:${FRESHRSS_TAG}
    container_name: freshrss
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      CRON_MIN: "3,33"
      BASE_URL: ${FRESHRSS_BASE_URL}
    ports:
    - "${FRESHRSS_PORT}:80"
    volumes:
    - freshrss_data:/var/www/FreshRSS/data
    - freshrss_extensions:/var/www/FreshRSS/extensions

    healthcheck:
      test:
      - CMD-SHELL
      - >-
        php -r 'exit(@file_get_contents("http://localhost/i/") === false ? 1 : 0);'
      interval: 30s
      timeout: 10s
      retries: 3
volumes:
  freshrss_data:
  freshrss_extensions:
