name: searxng

services:
  searxng-redis:
    image: docker.io/library/redis:7-alpine
    container_name: searxng-redis
    restart: unless-stopped

    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 10s
      timeout: 5s
      retries: 5
  searxng:
    image: searxng/searxng:${SEARXNG_TAG}
    container_name: searxng
    restart: unless-stopped
    environment:
      SEARXNG_BASE_URL: https://search.internal
      SEARXNG_SECRET: ${SEARXNG_SECRET_KEY}
    ports:
    - "${SEARXNG_PORT}:8080"
    volumes:
    - searxng_config:/etc/searxng
    depends_on:
    - searxng-redis

    healthcheck:
      test:
      - CMD
      - wget
      - -qO-
      - http://localhost:8080/stats
      interval: 30s
      timeout: 10s
      retries: 3
volumes:
  searxng_config:
