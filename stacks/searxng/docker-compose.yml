name: searxng

services:
  searxng-redis:
    image: docker.io/library/redis:7-alpine
    container_name: searxng-redis
    restart: unless-stopped

  searxng:
    image: searxng/searxng:${SEARXNG_TAG}
    container_name: searxng
    restart: unless-stopped
    environment:
      SEARXNG_BASE_URL: https://search.internal
      SEARXNG_SECRET: ${SEARXNG_SECRET_KEY}
    ports:
      - "${SEARXNG_PORT}:8080"
    volumes:
      - searxng_config:/etc/searxng
    depends_on:
      - searxng-redis

volumes:
  searxng_config:
