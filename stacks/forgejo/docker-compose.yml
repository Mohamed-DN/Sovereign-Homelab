name: forgejo

services:
  forgejo-db:
    image: docker.io/library/postgres:16-alpine
    container_name: forgejo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${FORGEJO_DB}
      POSTGRES_USER: ${FORGEJO_DB_USER}
      POSTGRES_PASSWORD: ${FORGEJO_DB_PASSWORD}
    volumes:
    - forgejo_db:/var/lib/postgresql/data

    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      interval: 10s
      timeout: 5s
      retries: 5
  forgejo:
    image: codeberg.org/forgejo/forgejo:${FORGEJO_TAG}
    container_name: forgejo
    restart: unless-stopped
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      FORGEJO__database__DB_TYPE: postgres
      FORGEJO__database__HOST: forgejo-db:5432
      FORGEJO__database__NAME: ${FORGEJO_DB}
      FORGEJO__database__USER: ${FORGEJO_DB_USER}
      FORGEJO__database__PASSWD: ${FORGEJO_DB_PASSWORD}
      FORGEJO__security__INSTALL_LOCK: "true"
      FORGEJO__server__ROOT_URL: ${FORGEJO_ROOT_URL}
      FORGEJO__server__DOMAIN: ${FORGEJO_DOMAIN}
      FORGEJO__server__SSH_PORT: ${FORGEJO_SSH_PORT}
      # Local self-signup stays closed; accounts are auto-provisioned only via
      # the Authentik OIDC source (users granted access-forgejo in the IAM console).
      FORGEJO__service__DISABLE_REGISTRATION: "false"
      FORGEJO__service__ALLOW_ONLY_EXTERNAL_REGISTRATION: "true"
      FORGEJO__oauth2_client__ENABLE_AUTO_REGISTRATION: "true"
      FORGEJO__oauth2_client__USERNAME: nickname
      FORGEJO__oauth2_client__ACCOUNT_LINKING: auto
    ports:
    - "${FORGEJO_HTTP_PORT}:3000"
    - "${FORGEJO_SSH_PORT}:22"
    volumes:
    - forgejo_data:/data
    # System CA bundle + the Sovereign internal root CA, so Forgejo (Go) can
    # validate https://auth.internal for OIDC discovery. Regenerate after image
    # updates: container's bundle + /root/sovereign-secrets/ca/sovereign-root-ca.crt.
    - ./ca-bundle.crt:/etc/ssl/certs/ca-certificates.crt:ro
    depends_on:
    - forgejo-db

volumes:
  forgejo_db:
  forgejo_data:
