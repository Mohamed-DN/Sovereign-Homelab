name: sovereign-core-network

services:
  headscale:
    image: headscale/headscale:${HEADSCALE_TAG}
    container_name: headscale
    restart: unless-stopped
    command: serve
    ports:
      - "${HEADSCALE_HTTP_PORT}:8080"
      - "${HEADSCALE_METRICS_PORT}:9090"
    volumes:
      - ./headscale/config:/etc/headscale
      - ./headscale/data:/var/lib/headscale
      - ./headscale/policy:/etc/headscale/policy

  headscale-ui:
    image: ghcr.io/gurucomputing/headscale-ui:${HEADSCALE_UI_TAG}
    container_name: headscale-ui
    restart: unless-stopped
    ports:
      - "${HEADSCALE_UI_PORT}:8080"

  # Headplane: modern web UI for Headscale (device/user/pre-auth-key management,
  # ACL view, and OIDC login). Reads only Headscale's config.yaml (not its
  # private keys). Its own config (with the Headscale API key + cookie secret)
  # lives root-only at ./headplane/config.yaml on the host, never in git.
  headplane:
    image: ghcr.io/tale/headplane:${HEADPLANE_TAG}
    container_name: headplane
    restart: unless-stopped
    depends_on:
      - headscale
    ports:
      - "${HEADPLANE_PORT}:3000"
    volumes:
      - ./headplane/config.yaml:/etc/headplane/config.yaml:ro
      # Internal root CA so Node trusts https://auth.internal for OIDC login.
      # Copy from /root/sovereign-secrets/ca/sovereign-root-ca.crt (pve).
      - ./headplane/ca.pem:/etc/headplane/ca.pem:ro
      - ./headscale/config/config.yaml:/etc/headscale/config.yaml:ro
      - ./headplane/data:/var/lib/headplane
    environment:
      NODE_EXTRA_CA_CERTS: /etc/headplane/ca.pem

  adguardhome:
    image: adguard/adguardhome:${ADGUARD_TAG}
    container_name: adguardhome
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./adguard/work:/opt/adguardhome/work
      - ./adguard/conf:/opt/adguardhome/conf

  npm:
    image: jc21/nginx-proxy-manager:${NPM_TAG}
    container_name: npm
    restart: unless-stopped
    ports:
      - "${NPM_HTTP_PORT}:80"
      - "${NPM_HTTPS_PORT}:443"
      - "${NPM_ADMIN_PORT}:81"
    volumes:
      - ./npm/data:/data
      - ./npm/letsencrypt:/etc/letsencrypt
