name: sovereign-core-network

services:
  headscale:
    image: headscale/headscale:${HEADSCALE_TAG}
    container_name: headscale
    restart: unless-stopped
    command: serve
    ports:
      - "${HEADSCALE_HTTP_PORT}:8080"
      - "${HEADSCALE_METRICS_PORT}:9090"
    volumes:
      - ./headscale/config:/etc/headscale
      - ./headscale/data:/var/lib/headscale
      - ./headscale/policy:/etc/headscale/policy

  headscale-ui:
    image: ghcr.io/gurucomputing/headscale-ui:${HEADSCALE_UI_TAG}
    container_name: headscale-ui
    restart: unless-stopped
    ports:
      - "${HEADSCALE_UI_PORT}:8080"

  adguardhome:
    image: adguard/adguardhome:${ADGUARD_TAG}
    container_name: adguardhome
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./adguard/work:/opt/adguardhome/work
      - ./adguard/conf:/opt/adguardhome/conf

  npm:
    image: jc21/nginx-proxy-manager:${NPM_TAG}
    container_name: npm
    restart: unless-stopped
    ports:
      - "${NPM_HTTP_PORT}:80"
      - "${NPM_HTTPS_PORT}:443"
      - "${NPM_ADMIN_PORT}:81"
    volumes:
      - ./npm/data:/data
      - ./npm/letsencrypt:/etc/letsencrypt
