    - Headscale UI:
        id: network-headscale-ui
        icon: headscale.png
        href: https://headscale.internal
        siteMonitor: https://headscale.internal
        description: LXC100 192.168.1.50:8081, users, devices, routes, and exit-node approvals
    - Nginx Proxy Manager:
        id: network-npm
        icon: nginx-proxy-manager.png
        href: https://npm.internal
        siteMonitor: https://npm.internal
        description: LXC100 192.168.1.50:81, reverse proxy, aliases, and certificates

- Admin:
    - Proxmox VE:
        id: admin-proxmox
        icon: proxmox.png
        href: https://proxmox.internal
        siteMonitor: https://proxmox.internal
        description: P710 192.168.1.150:8006, Smallstep HTTPS alias for VMs, LXCs, bridges, and storage
        widget:
          type: proxmox
          url: https://proxmox.internal
          username: "{{HOMEPAGE_VAR_PVE_TOKEN_ID}}"
          password: "{{HOMEPAGE_VAR_PVE_TOKEN_SECRET}}"
          node: pve
- Identity:
    - Authentik:
        id: identity-authentik
        icon: authentik.png
        href: https://auth.internal/if/user/
        siteMonitor: https://auth.internal/if/user/
        description: LXC101 192.168.1.51:9000, SSO, MFA, proxy providers, and OIDC
    - Internal CA Health:
        id: identity-internal-ca
        icon: sh-small-step.png
        href: https://ca.internal:9002/health
        siteMonitor: https://ca.internal:9002/health
        description: LXC101 192.168.1.51:9002, Smallstep CA health for private .internal TLS

- Recovery:
    - Proxmox Backup Server:
        id: recovery-pbs
        icon: proxmox.png
        href: https://pbs.internal
        siteMonitor: https://pbs.internal
        description: RECOVERY - datastore, verify jobs, retention, and isolated restore drills
        widget:
          type: proxmoxbackupserver
          url: https://pbs.internal
          username: "{{HOMEPAGE_VAR_PBS_TOKEN_ID}}"
          password: "{{HOMEPAGE_VAR_PBS_TOKEN_SECRET}}"
          datastore: p710-local
    - HTTPS Trust Portal:
        id: recovery-trust
        icon: sh-small-step.png
        href: https://trust.internal
        siteMonitor: https://trust.internal/healthz
        description: RECOVERY - install and verify private CA trust on personal clients

- At a Glance:
    - Fleet Health:
        id: glance-fleet-health
        icon: uptime-kuma.png
        href: https://status.internal/status/sovereign-ops
        siteMonitor: https://status.internal/api/status-page/sovereign-ops
        description: Live rollup of all LAN, VPN, platform, data, and application monitors
        widget:
          type: uptimekuma
          url: http://uptime-kuma:3001
          slug: sovereign-ops
          fields: ["up", "down", "uptime", "incident"]
    - Network Inventory:
        id: glance-netalertx
        icon: netalertx.png
        href: https://netalert.internal
        siteMonitor: https://netalert.internal
        description: Connected, new, and unavailable LAN devices (open for the live inventory)
    - Disk Health:
        id: glance-scrutiny
        icon: scrutiny.png
        href: https://disks.internal
        siteMonitor: https://disks.internal/api/summary
        description: SMART results collected from the physical Proxmox disks
        widget:
          type: scrutiny
          url: http://192.168.1.53:8085
          fields: ["passed", "failed", "unknown"]
    - Recent Alerts:
        id: glance-ntfy
        icon: ntfy.png
        href: https://alerts.internal
        siteMonitor: https://alerts.internal/v1/health
        description: Latest protected notification on the sovereign operations topic
        widget:
          type: ntfy
          url: http://192.168.1.53:8093
          topic: sovereign-alerts
          key: "{{HOMEPAGE_VAR_NTFY_READER_TOKEN}}"
          fields: ["title", "message", "priority", "lastReceived"]

