name: sovereign-observability

services:
  homepage:
    image: ghcr.io/gethomepage/homepage:${HOMEPAGE_TAG}
    container_name: homepage
    restart: unless-stopped
    env_file:
    - path: ${HOMEPAGE_MONITORING_ENV_FILE}
      required: false
    environment:
      HOMEPAGE_ALLOWED_HOSTS: ${HOMEPAGE_ALLOWED_HOSTS}
      NODE_EXTRA_CA_CERTS: ${HOMEPAGE_NODE_EXTRA_CA_CERTS}
    ports:
    - "${HOMEPAGE_PORT}:3000"
    volumes:
    - ./homepage:/app/config
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - ${HOMEPAGE_INTERNAL_CA_HOST_PATH}:${HOMEPAGE_NODE_EXTRA_CA_CERTS}:ro
  uptime-kuma:
    image: louislam/uptime-kuma:${UPTIME_KUMA_TAG}
    container_name: uptime-kuma
    restart: unless-stopped
    environment:
      NODE_EXTRA_CA_CERTS: ${UPTIME_KUMA_NODE_EXTRA_CA_CERTS}
      # Kuma has no OIDC support, so true "one password via LDAP" isn't
      # possible for it. Instead it trusts the network layer entirely: its
      # own login is disabled and the Authentik forward-auth gate on
      # status.internal (access-uptime-kuma group) is the only door. The
      # LAN-direct port below stays reachable host-to-host (NPM and Kuma run
      # on different LXCs, so it can't be bound to loopback) -- documented
      # residual risk, see IAM_LDAP_SSO_PLAN.md.
      UPTIME_KUMA_DISABLE_AUTH: "true"
    ports:
    - "${UPTIME_KUMA_PORT}:3001"
    volumes:
    - uptime_kuma_data:/app/data
    - ${UPTIME_KUMA_INTERNAL_CA_HOST_PATH}:${UPTIME_KUMA_NODE_EXTRA_CA_CERTS}:ro

    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:3001/
      interval: 30s
      timeout: 10s
      retries: 3
  beszel:
    image: henrygd/beszel:${BESZEL_TAG}
    container_name: beszel
    restart: unless-stopped
    ports:
    - "${BESZEL_PORT}:8090"
    volumes:
    - beszel_data:/beszel_data

  beszel-agent:
    image: henrygd/beszel-agent:${BESZEL_AGENT_TAG}
    container_name: beszel-agent
    profiles:
    - manual-agent
    restart: unless-stopped
    network_mode: host
    environment:
      KEY: ${BESZEL_AGENT_KEY}
      TOKEN: ${BESZEL_AGENT_TOKEN}
      HUB_URL: ${BESZEL_AGENT_HUB_URL}
      SYSTEM_NAME: ${BESZEL_AGENT_SYSTEM_NAME}
      LISTEN: ${BESZEL_AGENT_LISTEN}
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro

  dozzle:
    image: amir20/dozzle:${DOZZLE_TAG}
    container_name: dozzle
    restart: unless-stopped
    ports:
    - "${DOZZLE_PORT}:8080"
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
volumes:
  uptime_kuma_data:
  beszel_data:
