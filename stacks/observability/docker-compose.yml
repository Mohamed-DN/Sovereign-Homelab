name: sovereign-observability

services:
  homepage:
    image: ghcr.io/gethomepage/homepage:${HOMEPAGE_TAG}
    container_name: homepage
    restart: unless-stopped
    environment:
      HOMEPAGE_ALLOWED_HOSTS: ${HOMEPAGE_ALLOWED_HOSTS}
    ports:
    - "${HOMEPAGE_PORT}:3000"
    volumes:
    - ./homepage:/app/config
    - /var/run/docker.sock:/var/run/docker.sock:ro
  uptime-kuma:
    image: louislam/uptime-kuma:${UPTIME_KUMA_TAG}
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
    - "${UPTIME_KUMA_PORT}:3001"
    volumes:
    - uptime_kuma_data:/app/data

    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:3001/
      interval: 30s
      timeout: 10s
      retries: 3
  beszel:
    image: henrygd/beszel:${BESZEL_TAG}
    container_name: beszel
    restart: unless-stopped
    ports:
    - "${BESZEL_PORT}:8090"
    volumes:
    - beszel_data:/beszel_data

  beszel-agent:
    image: henrygd/beszel-agent:${BESZEL_AGENT_TAG}
    container_name: beszel-agent
    profiles:
    - manual-agent
    restart: unless-stopped
    network_mode: host
    environment:
      KEY: ${BESZEL_AGENT_KEY}
      TOKEN: ${BESZEL_AGENT_TOKEN}
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro

  dozzle:
    image: amir20/dozzle:${DOZZLE_TAG}
    container_name: dozzle
    restart: unless-stopped
    ports:
    - "${DOZZLE_PORT}:8080"
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
volumes:
  uptime_kuma_data:
  beszel_data:
