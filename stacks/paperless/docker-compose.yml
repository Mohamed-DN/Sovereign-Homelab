name: paperless

services:
  paperless-db:
    image: docker.io/library/postgres:16-alpine
    container_name: paperless-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PAPERLESS_DB}
      POSTGRES_USER: ${PAPERLESS_DB_USER}
      POSTGRES_PASSWORD: ${PAPERLESS_DB_PASSWORD}
    volumes:
    - paperless_db:/var/lib/postgresql/data

    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      interval: 10s
      timeout: 5s
      retries: 5
  paperless-redis:
    image: docker.io/library/redis:7-alpine
    container_name: paperless-redis
    restart: unless-stopped
    volumes:
    - paperless_redis:/data

    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 10s
      timeout: 5s
      retries: 5
  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:${PAPERLESS_TAG}
    container_name: paperless
    restart: unless-stopped
    depends_on:
    - paperless-db
    - paperless-redis
    environment:
      PAPERLESS_SECRET_KEY: ${PAPERLESS_SECRET_KEY}
      PAPERLESS_URL: ${PAPERLESS_URL}
      PAPERLESS_REDIS: redis://paperless-redis:6379
      PAPERLESS_DBHOST: paperless-db
      PAPERLESS_DBNAME: ${PAPERLESS_DB}
      PAPERLESS_DBUSER: ${PAPERLESS_DB_USER}
      PAPERLESS_DBPASS: ${PAPERLESS_DB_PASSWORD}
      PAPERLESS_TIME_ZONE: ${TZ}
      # --- OIDC (Authentik SSO) ---
      PAPERLESS_APPS: ${PAPERLESS_APPS}
      PAPERLESS_SOCIALACCOUNT_PROVIDERS: ${PAPERLESS_SOCIALACCOUNT_PROVIDERS}
      PAPERLESS_SOCIAL_AUTO_SIGNUP: ${PAPERLESS_SOCIAL_AUTO_SIGNUP}
      PAPERLESS_SOCIALACCOUNT_ALLOW_SIGNUPS: ${PAPERLESS_SOCIALACCOUNT_ALLOW_SIGNUPS}
      PAPERLESS_LOGOUT_REDIRECT_URL: ${PAPERLESS_LOGOUT_REDIRECT_URL}
      # allauth's `requests`-based OIDC client bundles its own certifi store and
      # ignores the system CA store urllib/openssl would trust, so it needs the
      # container's CA bundle pointed out explicitly (see ca-bundle.crt below).
      REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
    ports:
    - "${PAPERLESS_PORT}:8000"
    volumes:
    - paperless_data:/usr/src/paperless/data
    - paperless_media:/usr/src/paperless/media
    - ./data/paperless/export:/usr/src/paperless/export
    - ./data/paperless/consume:/usr/src/paperless/consume
    # Internal root CA so allauth's OIDC client can reach https://auth.internal.
    # Host-local, regenerated after image updates (system bundle + the internal
    # root CA appended) — same pattern as stacks/forgejo and stacks/jellyfin.
    - ./ca-bundle.crt:/etc/ssl/certs/ca-certificates.crt:ro

    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8000/
      interval: 30s
      timeout: 10s
      retries: 3
volumes:
  paperless_db:
  paperless_redis:
  paperless_data:
  paperless_media:
